name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        env:
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_FIREBASE_API_KEY: "AIzaSyAEJOzWMbRt8eHofI88MqyTr1dWWPdGIAU"
          VITE_FIREBASE_AUTH_DOMAIN: "quanlytailieu-demo.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "quanlytailieu-demo"
          VITE_FIREBASE_STORAGE_BUCKET: "quanlytailieu-demo.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "19661308499"
          VITE_FIREBASE_APP_ID: "1:19661308499:web:2ee7127f3fb566472cfca6"
          VITE_FIREBASE_MEASUREMENT_ID: "G-8EX9RN3ZWH"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
